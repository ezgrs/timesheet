services:
  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    container_name: pdf-service
    restart: unless-stopped
    ports:
      - "8081:8080"

  holidays-service:
    build:
      context: ./holidays-service
      dockerfile: Dockerfile
    env_file:
      - ./env/holidays.env
    container_name: holidays-service
    restart: unless-stopped
    ports:
      - "8082:8080"

  users-service:
    build:
      context: ./users-service
      dockerfile: Dockerfile
    env_file:
      - ./env/users.env
    container_name: users-service
    restart: unless-stopped
    ports:
      - "8083:3000"

networks:
  default:
    name: microservices-network
