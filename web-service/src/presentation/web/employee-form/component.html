<form [formGroup]="form" (ngSubmit)="submit()" class="flex items-start gap-3">
    <input
        formControlName="name"
        placeholder="Name"
        class="flex-1 rounded border p-2"
    />

    <div class="flex flex-col">
        <input
            formControlName="code"
            placeholder="9999999-999"
            mask="0000000-000"
            class="w-44 rounded border p-2"
            [dropSpecialCharacters]="false"
        />
        @if (form.controls.code.invalid && (form.controls.code.dirty || form.controls.code.touched)) {
            @if (form.controls.code.errors?.['pattern']) {
                <small class="text-red-600">Código inválido.</small>
            }
        }
    </div>

    <input
        formControlName="role"
        placeholder="Role"
        class="w-40 rounded border p-2"
    />

    <button
        type="submit"
        class="rounded bg-blue-600 px-4 py-2 text-white hover:bg-blue-700"
    >
        Add
    </button>
</form>
