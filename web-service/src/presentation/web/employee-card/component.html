<div
    class="flex items-center justify-between gap-3 rounded border bg-white p-3 shadow-sm"
>
    <div class="flex flex-col">
        <div class="flex items-center gap-4">
            <span class="font-semibold">{{ employee.name }}</span>
            <span class="text-gray-600">{{ employee.code }}</span>
        </div>
        <span class="text-gray-600 font-semibold">{{ employee.role }}</span>
    </div>

    <button
        (click)="remove.emit()"
        class="rounded bg-red-500 px-3 py-1 text-white hover:bg-red-600"
    >
        Delete
    </button>
</div>
